# Copy to config/niches.yaml and fill in. This seeds Stage 1 sourcing.
# `handle` = a YouTube @handle OR a full channel /videos URL.
# `lane`: owned = your YPP transformation channel (the only lane — pure owned-first).
#
# The niche-research agent fills the real file; this is the shape + a few
# clip-friendly examples to smoke-test against.

niches:
  - name: business-mindset
    lane_default: owned
    creators:
      - name: "Diary of a CEO"
        handle: "@TheDiaryOfACEO"
        lane: owned
        notes: "High-RPM business niche; long episodes = many clip points."
      - name: "Modern Wisdom"
        handle: "@ChrisWillx"
        lane: owned
        notes: "Story-payoff + cliffhanger hooks travel well."

  - name: comedy-podcast
    lane_default: owned
    creators:
      - name: "Flagrant"
        handle: "@FlagrantClips"
        lane: owned
        notes: "Debate-moment + question hooks = top combo in testing."

  - name: creator-economy
    lane_default: owned
    creators:
      - name: "Example Streamer"
        handle: "https://www.youtube.com/@example/videos"
        lane: owned
        notes: "Replace with real owned-channel source creators."
